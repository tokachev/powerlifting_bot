# Канонический каталог упражнений. Ключ = canonical_name (snake_case, английский).
# aliases — список вариантов, как их пишет пользователь. Матчинг case-insensitive, по
# нормализованной форме (см. domain/catalog.py: lowercase + замена ё→е + удаление
# пунктуации). Porting падежей — через общий корень в aliases.
#
# movement_pattern — один из: squat, hinge, push, pull, carry, core, accessory, unknown
# target_group    — опционально: squat | bench | deadlift. Соревновательные SBD-движения.
#                    Используется для КПШ-бакетов в дашборде; отсутствие = попадает в "other".
# muscle_group    — один из: legs | chest | back | shoulders | arms | core. Prime-mover
#                    мышечная группа для фильтра дашборда (bodybuilding-style split).
#                    Deadlift относим к back (trap/erector/lat), romanian/hip_thrust — к legs.

back_squat:
  movement_pattern: squat
  target_group: squat
  muscle_group: legs
  aliases: [присед, приседания, приседания со штангой, присед со штангой, бэк сквот, back squat]

